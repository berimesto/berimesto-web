<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>БериМесто</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style>
    body { margin:0; font-family: sans-serif; }
    #navbar { background:#333; color:#fff; padding:10px; display:flex; gap:10px; position:fixed; top:0; left:0; width:100%; z-index:1001; }
    #navbar button { background:#555; color:#fff; border:none; padding:5px 10px; cursor:pointer; }
    #map { width:100%; height:70vh; margin-top:50px; } /* margin-top чтобы navbar не перекрывал */
    #warehouse-popup {
      display:none;
      background:#fff;
      padding:15px;
      position:fixed;
      bottom:10px;
      left:50%;
      transform:translateX(-50%);
      width:90%;
      max-width:500px;
      border:1px solid #ccc;
      box-shadow:0 0 10px rgba(0,0,0,0.3);
      z-index:1000;
    }
    #cells-list {
      display:none;
      background:#fff;
      padding:15px;
      position:fixed;
      top:60px; /* не перекрывает navbar */
      left:50%;
      transform:translateX(-50%);
      width:90%;
      max-width:500px;
      border:1px solid #ccc;
      box-shadow:0 0 10px rgba(0,0,0,0.3);
      z-index:1000;
    }
    #cells-list ul { list-style:none; padding:0; }
    #cells-list li { margin:5px 0; }
    #cells-list button { margin-left:10px; }
  </style>
</head>
<body>

  <div id="navbar">
    <button onclick="showTab('map')">Карта</button>
    <button onclick="showTab('cells')">Мои ячейки</button>
  </div>

  <div id="map"></div>

  <!-- Popup склада -->
  <div id="warehouse-popup">
    <img id="popup-img" src="" style="width:100%; height:150px; object-fit:cover;">
    <h3 id="popup-name"></h3>
    <p id="popup-address"></p>
    <p id="popup-min-price"></p>
    <button id="popup-select">Выбрать ячейку</button>
  </div>

  <!-- Экран ячеек -->
  <div id="cells-list">
    <h3>Ячейки</h3>
    <ul id="cells-ul"></ul>
    <button onclick="closeCellsScreen()">Закрыть</button>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.30.1/dist/supabase.min.js"></script>
  <script src="app.js"></script>

</body>
</html>
