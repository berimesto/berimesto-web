<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>БериМесто</title>
  <style>
    body { margin:0; font-family:sans-serif; }
    #navbar { background:#333; color:#fff; padding:10px; display:flex; gap:10px; position:fixed; top:0; left:0; width:100%; z-index:1001; }
    #navbar button { background:#555; color:#fff; border:none; padding:5px 10px; cursor:pointer; }
    .tab { display:none; padding:60px 20px 20px 20px; }
    .warehouse, .cell { border:1px solid #ccc; padding:10px; margin:10px 0; display:flex; gap:10px; align-items:center; }
    .warehouse img, .cell img { width:100px; height:70px; object-fit:cover; }
    button.book { margin-left:auto; }
  </style>
</head>
<body>

  <div id="navbar">
    <button onclick="showTab('warehouses')">Склады</button>
    <button onclick="showTab('cells')">Ячейки</button>
    <button onclick="showTab('my-access')">Мой Доступ</button>
  </div>

  <!-- Вкладка Склады -->
  <div id="warehouses" class="tab"></div>

  <!-- Вкладка Ячейки -->
  <div id="cells" class="tab"></div>

  <!-- Вкладка Мой доступ -->
  <div id="my-access" class="tab">
    <p>Интеграция с TT-Lock будет здесь</p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.30.1/dist/supabase.min.js"></script>
  <script src="app.js"></script>

</body>
</html>
